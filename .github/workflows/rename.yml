# ai code fuck ai
name: Initialize Template Repository

on: [push]

jobs:
  rename-template:
    runs-on: ubuntu-latest
    # This prevents the script from running inside your actual template repository
    if: github.repository != 'ZachTheMighty/template'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Replace Template Name in Files
        run: |
          # Get the new repository name (e.g., "my-new-app")
          REPO_NAME="${{ github.event.repository.name }}"

          # Find and replace "template" with the new repo name in package.json and README.md
          sed -i "s/template/$REPO_NAME/g" package.json
          sed -i "s/template/$REPO_NAME/g" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add package.json README.md
          git commit -m "chore: automatically initialize project from template"
          git push
